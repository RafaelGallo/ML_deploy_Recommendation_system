apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: recommender-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/cpu-throttling: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT_ID/recommender-api:latest
          ports:
            - containerPort: 8000
          resources:
            limits:
              cpu: "1"
              memory: 2Gi
          env:
            - name: MLFLOW_TRACKING_URI
              value: "https://mlflow.railway.app"
            - name: MODELS_DIR
              value: "/app/models"
            - name: DATA_PATH
              value: "/app/output/df_products.csv"
